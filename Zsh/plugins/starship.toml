format = """
$username\
$fill\
$line_break\
$directory\
$line_break\
$character"""

[username]
show_always = true
# ExplicaciГіn de colores:
# #D1902E: Suse / Flechas exteriores
# #D02F64: Rust-C# / Flechas cercanas al usuario
# #187A77: El Usuario
format = """
[ вҒәвңҰвӮҠ ](#D1902E)\
[оӮІ](#D1902E)\
[оғ–](#D1902E)\
[ оһЁ ](#D02F64)\
[оӮІ](#D02F64)\
[оғ–](#D02F64)\
[ $user ](fg:#187A77 bold)\
[оғ—](#D02F64)\
[оӮ°](#D02F64)\
[ оҷҲ ](#D02F64)\
[оғ—](#D1902E)\
[оӮ°](#D1902E)\
[ вӮҠвңҰвҒә ](#D1902E) """

[directory]
style = "#187A77"
truncation_length = 3

[fill]
symbol = " "

[character]
success_symbol = "[==>](bold green)"
error_symbol = "[==>](bold red)"
