# Fonts and Text
font=JetBrainsMono Nerd Font 12
markup=1
format=<b>%a : %s</b> \n %b
icons=1
max-icon-size=64
icon-path=/home/Zukunter/.local/share/icons:/usr/share/icons:/usr/share/pixmaps
# Colors
background-color=#091819
text-color=#D1902E
border-color=#187A77
# Sizes
width=300
height=300
border-radius=25
border-size=3
padding=3
margin=6
# Button
on-button-left=dismiss
on-button-middle=dismiss-all
on-button-right=invoke-default-action
# Notify
anchor=top-right
on-notify=exec ~/User/ElBastionDelOlvido/Desktop/Sources/Scripts/PlayFolder.sh 0
default-timeout=7500
sort=-time
max-visible=5
[app-name=System]
# Fonts and Text
font=JetBrainsMono Nerd Font 16
markup=1
format=<b>%s</b>
icons=1
max-icon-size=64
icon-path=/home/Zukunter/.local/share/icons:/usr/share/icons:/usr/share/pixmaps
# Colors
background-color=#091819
text-color=#D02F64
border-color=#187A77
# Sizes
width=325
height=100
border-radius=25
border-size=3
padding=3
margin=4
# Button
on-button-left=dismiss
on-button-middle=dismiss-all
on-button-right=invoke-default-action
# Notify
on-notify=none
anchor=top-left
default-timeout=500
