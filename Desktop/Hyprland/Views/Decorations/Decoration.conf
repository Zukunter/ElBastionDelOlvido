decoration {
    rounding = 5
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    #inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 9
        render_power = 1
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 2
        passes = 1
	new_optimizations = true
        vibrancy = 0.17
    }
}

